version: '3.8'
services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tea_shop
      MYSQL_USER: tea
      MYSQL_PASSWORD: tea
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
  redis:
    image: redis:6
    ports:
      - "6379:6379"
volumes:
  mysql-data:
